<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 둘의 일정표</title>
  <style>
    :root {
      --bg: #fff7f3;
      --panel: #ffffff;
      --primary: #ff7f9f;
      --primary-dark: #e85f84;
      --mint: #bce8df;
      --peach: #ffd7c8;
      --lavender: #d9cdf7;
      --text: #3e3336;
      --muted: #817176;
      --line: #f0dfe3;
      --shadow: 0 18px 45px rgba(206, 112, 132, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 215, 200, 0.72), transparent 32rem),
        radial-gradient(circle at top right, rgba(188, 232, 223, 0.75), transparent 30rem),
        linear-gradient(135deg, #fff7f3 0%, #fffafb 48%, #f6fffc 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 560px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .summary {
      min-width: 178px;
      padding: 18px;
      border: 1px solid rgba(255, 127, 159, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .summary strong {
      display: block;
      margin-top: 4px;
      color: var(--primary-dark);
      font-size: 34px;
    }

    .sync-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 410px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(240, 223, 227, 0.92);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255, 215, 200, 0.42), rgba(188, 232, 223, 0.34));
    }

    .panel-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .heart {
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 999px;
      color: white;
      background: var(--primary);
      box-shadow: 0 10px 22px rgba(255, 127, 159, 0.28);
    }

    form {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      color: #66555b;
      font-size: 13px;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #efd7dd;
      border-radius: 8px;
      background: #fffdfd;
      color: var(--text);
      outline: none;
      padding: 12px 13px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 127, 159, 0.14);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      border-radius: 8px;
      padding: 0 16px;
      font-weight: 900;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), #ff9c89);
      box-shadow: 0 12px 22px rgba(255, 127, 159, 0.26);
    }

    .btn-ghost {
      color: var(--primary-dark);
      background: #fff0f4;
    }

    .btn-outline {
      min-height: 38px;
      border: 1px solid rgba(255, 127, 159, 0.32);
      color: #8f4f62;
      background: rgba(255, 255, 255, 0.84);
      font-size: 13px;
    }

    .btn-small {
      min-height: 36px;
      padding: 0 12px;
      font-size: 13px;
    }

    .btn-edit {
      color: #3f6b62;
      background: #e9faf6;
    }

    .btn-delete {
      color: #b34b68;
      background: #fff0f4;
    }

    .list-wrap {
      padding: 18px;
    }

    .schedule-list {
      display: grid;
      gap: 14px;
    }

    .schedule-card {
      position: relative;
      display: grid;
      grid-template-columns: 98px 1fr;
      gap: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff, #fff8fa);
      padding: 16px;
      box-shadow: 0 10px 22px rgba(132, 92, 102, 0.08);
    }

    .date-box {
      display: grid;
      place-items: center;
      min-height: 96px;
      border-radius: 8px;
      background: linear-gradient(145deg, var(--peach), #fff1d9);
      text-align: center;
    }

    .date-box .month {
      color: #8b5961;
      font-size: 13px;
      font-weight: 800;
    }

    .date-box .day {
      color: #4d3c41;
      font-size: 34px;
      font-weight: 950;
      line-height: 1;
    }

    .date-box .weekday {
      color: #8b5961;
      font-size: 12px;
      font-weight: 800;
    }

    .card-main {
      min-width: 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      margin: 0;
      color: #342a2d;
      font-size: 20px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .time-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      background: #edf9f6;
      color: #477069;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      border-radius: 999px;
      background: #f6f0ff;
      color: #635383;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .memo {
      margin: 8px 0 14px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 270px;
      border: 1px dashed #eccbd3;
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 247, 250, 0.72);
      text-align: center;
      padding: 28px;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--primary-dark);
      font-size: 20px;
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 22px, 680px);
        padding: 28px 0;
      }

      .hero,
      .layout {
        display: grid;
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .sync-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 540px) {
      .two-col,
      .actions {
        grid-template-columns: 1fr;
      }

      .schedule-card {
        grid-template-columns: 1fr;
      }

      .date-box {
        grid-template-columns: repeat(3, auto);
        justify-content: center;
        gap: 8px;
        min-height: 64px;
      }

      .date-box .day {
        font-size: 30px;
      }

      .card-top {
        display: grid;
      }

      .time-pill {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <p class="eyebrow"><span aria-hidden="true">♥</span> Couple Planner</p>
        <h1 id="page-title">우리 둘의 일정표</h1>
        <p>데이트, 기념일, 함께 챙길 일을 한곳에 적어두세요. 입력한 일정은 이 브라우저의 localStorage에 저장됩니다.</p>
      </div>
      <div class="summary" aria-live="polite">
        등록된 일정
        <strong id="scheduleCount">0</strong>
        <div class="sync-actions">
          <button class="btn btn-outline" type="button" id="exportButton">내보내기</button>
          <button class="btn btn-outline" type="button" id="importButton">가져오기</button>
        </div>
        <input type="file" id="importFile" accept="application/json,.json" hidden>
      </div>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-header">
          <h2 id="formTitle">새 일정 추가</h2>
          <span class="heart" aria-hidden="true">♥</span>
        </div>

        <form id="scheduleForm">
          <input type="hidden" id="scheduleId">

          <div class="two-col">
            <div class="field">
              <label for="date">날짜</label>
              <input type="date" id="date" required>
            </div>
            <div class="field">
              <label for="time">시간</label>
              <input type="time" id="time">
            </div>
          </div>

          <div class="field">
            <label for="title">제목</label>
            <input type="text" id="title" placeholder="예: 금요일 저녁 데이트" required>
          </div>

          <div class="field">
            <label for="place">장소</label>
            <input type="text" id="place" placeholder="예: 한강공원, 좋아하는 카페">
          </div>

          <div class="field">
            <label for="people">담당자 / 참여자</label>
            <input type="text" id="people" placeholder="예: 민지, 준호 / 둘 다">
          </div>

          <div class="field">
            <label for="memo">메모</label>
            <textarea id="memo" placeholder="준비물, 예약 정보, 하고 싶은 말 등을 적어보세요."></textarea>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit" id="submitButton">♥ 일정 저장</button>
            <button class="btn btn-ghost" type="button" id="resetButton">초기화</button>
          </div>
        </form>
      </article>

      <article class="panel">
        <div class="panel-header">
          <h2>다가오는 일정</h2>
          <span class="heart" aria-hidden="true">♡</span>
        </div>
        <div class="list-wrap">
          <div id="scheduleList" class="schedule-list"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    // localStorage에 사용할 고정 키입니다.
    const STORAGE_KEY = "coupleScheduleItems";

    const form = document.getElementById("scheduleForm");
    const scheduleId = document.getElementById("scheduleId");
    const dateInput = document.getElementById("date");
    const timeInput = document.getElementById("time");
    const titleInput = document.getElementById("title");
    const placeInput = document.getElementById("place");
    const peopleInput = document.getElementById("people");
    const memoInput = document.getElementById("memo");
    const list = document.getElementById("scheduleList");
    const count = document.getElementById("scheduleCount");
    const formTitle = document.getElementById("formTitle");
    const submitButton = document.getElementById("submitButton");
    const resetButton = document.getElementById("resetButton");
    const exportButton = document.getElementById("exportButton");
    const importButton = document.getElementById("importButton");
    const importFile = document.getElementById("importFile");

    // 저장된 일정을 배열로 불러옵니다. 저장된 값이 없으면 빈 배열을 사용합니다.
    function loadSchedules() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    // 일정 배열을 localStorage에 다시 저장합니다.
    function saveSchedules(schedules) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
    }

    // 파일을 직접 열었을 때도 안정적으로 동작하도록 고유 ID를 만듭니다.
    function createScheduleId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      return `schedule-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    // 날짜와 시간을 기준으로 오름차순 정렬합니다.
    function sortSchedules(schedules) {
      return schedules.sort((a, b) => {
        const first = `${a.date}T${a.time || "00:00"}`;
        const second = `${b.date}T${b.time || "00:00"}`;
        return first.localeCompare(second);
      });
    }

    // 가져온 데이터가 일정 형식인지 확인하고 필요한 값만 정리합니다.
    function normalizeSchedule(value) {
      if (!value || !value.date || !value.title) {
        return null;
      }

      return {
        id: value.id || createScheduleId(),
        date: value.date,
        time: value.time || "",
        title: String(value.title).trim(),
        place: value.place || "",
        people: value.people || "",
        memo: value.memo || ""
      };
    }

    // HTML에 직접 들어갈 수 있는 특수문자를 안전하게 바꿉니다.
    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // 날짜 카드에 표시할 월, 일, 요일 정보를 만듭니다.
    function getDateParts(dateValue) {
      const date = new Date(`${dateValue}T00:00:00`);
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];

      return {
        month: `${date.getMonth() + 1}월`,
        day: String(date.getDate()).padStart(2, "0"),
        weekday: `${weekdays[date.getDay()]}요일`
      };
    }

    // 현재 localStorage 상태를 읽어 일정 목록 화면을 다시 그립니다.
    function renderSchedules() {
      const schedules = sortSchedules(loadSchedules());
      count.textContent = schedules.length;
      list.innerHTML = "";

      if (schedules.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div>
              <strong>아직 일정이 없어요</strong>
              첫 데이트 계획이나 기념일을 추가해보세요.
            </div>
          </div>
        `;
        return;
      }

      schedules.forEach((schedule) => {
        const parts = getDateParts(schedule.date);
        const card = document.createElement("article");
        card.className = "schedule-card";
        card.innerHTML = `
          <div class="date-box">
            <span class="month">${parts.month}</span>
            <span class="day">${parts.day}</span>
            <span class="weekday">${parts.weekday}</span>
          </div>
          <div class="card-main">
            <div class="card-top">
              <h3 class="card-title">${escapeHtml(schedule.title)}</h3>
              <span class="time-pill">${schedule.time ? escapeHtml(schedule.time) : "시간 미정"}</span>
            </div>
            <div class="meta">
              ${schedule.place ? `<span class="tag">📍 ${escapeHtml(schedule.place)}</span>` : ""}
              ${schedule.people ? `<span class="tag">♥ ${escapeHtml(schedule.people)}</span>` : ""}
            </div>
            ${schedule.memo ? `<p class="memo">${escapeHtml(schedule.memo)}</p>` : ""}
            <div class="card-actions">
              <button class="btn btn-small btn-edit" type="button" data-action="edit" data-id="${schedule.id}">수정</button>
              <button class="btn btn-small btn-delete" type="button" data-action="delete" data-id="${schedule.id}">삭제</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // 수정 모드를 끝내고 입력 폼을 새 일정 모드로 되돌립니다.
    function resetForm() {
      form.reset();
      scheduleId.value = "";
      formTitle.textContent = "새 일정 추가";
      submitButton.textContent = "♥ 일정 저장";
      dateInput.focus();
    }

    // 저장 버튼을 누르면 새 일정을 추가하거나 기존 일정을 업데이트합니다.
    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const schedules = loadSchedules();
      const id = scheduleId.value || createScheduleId();
      const nextSchedule = {
        id,
        date: dateInput.value,
        time: timeInput.value,
        title: titleInput.value.trim(),
        place: placeInput.value.trim(),
        people: peopleInput.value.trim(),
        memo: memoInput.value.trim()
      };

      const existingIndex = schedules.findIndex((schedule) => schedule.id === id);

      if (existingIndex >= 0) {
        schedules[existingIndex] = nextSchedule;
      } else {
        schedules.push(nextSchedule);
      }

      saveSchedules(sortSchedules(schedules));
      resetForm();
      renderSchedules();
    });

    // 목록의 수정/삭제 버튼은 이벤트 위임으로 처리합니다.
    list.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const schedules = loadSchedules();
      const id = button.dataset.id;
      const selected = schedules.find((schedule) => schedule.id === id);

      if (button.dataset.action === "edit" && selected) {
        scheduleId.value = selected.id;
        dateInput.value = selected.date;
        timeInput.value = selected.time;
        titleInput.value = selected.title;
        placeInput.value = selected.place;
        peopleInput.value = selected.people;
        memoInput.value = selected.memo;
        formTitle.textContent = "일정 수정";
        submitButton.textContent = "♥ 수정 저장";
        window.scrollTo({ top: 0, behavior: "smooth" });
        titleInput.focus();
      }

      if (button.dataset.action === "delete" && selected) {
        const ok = confirm(`"${selected.title}" 일정을 삭제할까요?`);
        if (!ok) return;

        saveSchedules(schedules.filter((schedule) => schedule.id !== id));
        renderSchedules();
      }
    });

    resetButton.addEventListener("click", resetForm);

    // 현재 브라우저에 저장된 일정을 JSON 파일로 내려받습니다.
    exportButton.addEventListener("click", () => {
      const schedules = sortSchedules(loadSchedules());
      const blob = new Blob([JSON.stringify(schedules, null, 2)], {
        type: "application/json"
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "couple-schedules.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    // 숨겨진 파일 입력창을 열어 다른 PC에서 가져온 JSON 파일을 선택합니다.
    importButton.addEventListener("click", () => {
      importFile.click();
    });

    // JSON 파일을 읽어 기존 일정과 합친 뒤 localStorage에 저장합니다.
    importFile.addEventListener("change", () => {
      const file = importFile.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.addEventListener("load", () => {
        try {
          const imported = JSON.parse(reader.result);
          const importedSchedules = Array.isArray(imported)
            ? imported.map(normalizeSchedule).filter(Boolean)
            : [];

          if (importedSchedules.length === 0) {
            alert("가져올 수 있는 일정이 없습니다.");
            return;
          }

          const schedulesById = new Map(loadSchedules().map((schedule) => [schedule.id, schedule]));
          importedSchedules.forEach((schedule) => {
            schedulesById.set(schedule.id, schedule);
          });

          saveSchedules(sortSchedules(Array.from(schedulesById.values())));
          resetForm();
          renderSchedules();
          alert("일정을 가져왔습니다.");
        } catch (error) {
          alert("JSON 파일을 읽을 수 없습니다.");
        } finally {
          importFile.value = "";
        }
      });

      reader.readAsText(file);
    });

    // 페이지가 처음 열릴 때 저장된 일정을 화면에 표시합니다.
    renderSchedules();
  </script>
</body>
</html>
